minimum_pre_commit_version: "3.5.0"

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.2
    hooks:
      - id: ruff-format
        name: "ruff format"
      - id: ruff
        name: "ruff check"
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        name: "mypy"
        args: [app.py, shaosongmap/]
        pass_filenames: false
        additional_dependencies: [pydantic>=2.10.4, fastapi>=0.115.6]

