services:
  app:
    build: .
    container_name: shaosongmap
    ports:
      - '8000:8000'
    env_file:
      - .env
    volumes:
      - ./static:/app/static:ro
    command:
      - uvicorn
      - app:app
      - --host
      - '0.0.0.0'
      - --port
      - '8000'
      - --timeout-graceful-shutdown
      - '30'
    restart: unless-stopped
