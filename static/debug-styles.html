<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地形渲染调试</title>
<script src="https://unpkg.com/roughjs@4.6.6/bundled/rough.js"></script>
<style>
  body { font-family: "Noto Serif SC", "SimSun", serif; background: #f2e8d5; padding: 20px; }
  h2 { margin: 12px 0 6px; font-size: 16px; }
  canvas { border: 1px solid #ccc; background: #f2e8d5; display: block; margin: 10px 0; }
  .controls { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
  .controls label { font-size: 12px; display: flex; flex-direction: column; gap: 2px; }
  .controls input[type=range] { width: 100px; }
  .controls input[type=color] { width: 40px; height: 24px; }
  button { padding: 6px 16px; margin-right: 8px; cursor: pointer; }
</style>
</head>
<body>
<h1>地形渲染调试 <button onclick="dumpParams()" style="font-size:14px">📋 打印参数到控制台</button></h1>

<h2>单个地形</h2>
<div class="controls">
  <label>类型 <select id="terType" onchange="redraw()">
    <option value="mountain">山 mountain</option>
    <option value="mountain_pass">山道 mountain_pass</option>
    <option value="river">河 river</option>
    <option value="battlefield">战场 battlefield</option>
    <option value="camp">营地 camp</option>
  </select></label>
  <label>填充样式 <select id="fillStyle" onchange="redraw()">
    <option value="hachure">hachure 斜线</option>
    <option value="cross-hatch" selected>cross-hatch 交叉格</option>
    <option value="zigzag">zigzag 锯齿</option>
    <option value="dashed">dashed 虚线</option>
    <option value="solid">solid 纯色</option>
  </select></label>
  <label>颜色 <input type="color" id="tColor" value="#8b7765" onchange="redraw()"></label>
  <label>透明度 <input type="range" id="tAlpha" min="0.05" max="0.5" step="0.05" value="0.15" oninput="redraw()"></label>
  <label>粗糙度 <input type="range" id="tRough" min="0" max="3" step="0.1" value="1.5" oninput="redraw()"></label>
  <label>线重 <input type="range" id="tWeight" min="0.5" max="4" step="0.1" value="1" oninput="redraw()"></label>
  <label>间距 <input type="range" id="tGap" min="2" max="20" step="1" value="6" oninput="redraw()"></label>
  <label>角度(°) <input type="range" id="tAngle" min="-90" max="90" value="-45" oninput="redraw()"></label>
  <label>椭圆宽 <input type="range" id="tSizeW" min="40" max="300" value="180" oninput="redraw()"></label>
  <label>椭圆高 <input type="range" id="tSizeH" min="40" max="300" value="120" oninput="redraw()"></label>
</div>
<canvas id="singleCanvas" width="400" height="250"></canvas>

<h2>预设组合（全部地形）</h2>
<canvas id="allCanvas" width="800" height="400"></canvas>

<script>
(function () {
  'use strict';

  var _hash32 = function (s) {
    var h = 0;
    for (var i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
    return h;
  };

  var PRESETS = {
    mountain:     { label: '山',        fillStyle: 'cross-hatch', color: '#8b7765', alpha: 0.18, roughness: 1.8, fillWeight: 1.2, hachureGap: 5,  hachureAngle: -45 },
    mountain_pass:{ label: '山道',      fillStyle: 'hachure',     color: '#9b8765', alpha: 0.14, roughness: 1.4, fillWeight: 0.8, hachureGap: 8,  hachureAngle: -30 },
    river:        { label: '河',        fillStyle: 'zigzag',      color: '#6495ed', alpha: 0.16, roughness: 0.8, fillWeight: 0.7, hachureGap: 7,  hachureAngle:  0  },
    battlefield:  { label: '战场',      fillStyle: 'dashed',      color: '#c23b22', alpha: 0.10, roughness: 1.2, fillWeight: 0.6, hachureGap: 9,  hachureAngle:  45 },
    camp:         { label: '营地',      fillStyle: 'solid',       color: '#b8a080', alpha: 0.08, roughness: 0.5, fillWeight: 1,   hachureGap: 10, hachureAngle:  0  }
  };

  function drawTerrain(rc, rg, cx, cy, w, h, preset) {
    var seed = _hash32('terrain-' + cx + '-' + cy);

    // 解析颜色+透明度
    var r = parseInt(preset.color.slice(1,3), 16);
    var g = parseInt(preset.color.slice(3,5), 16);
    var b = parseInt(preset.color.slice(5,7), 16);
    var fillColor = 'rgba(' + r + ',' + g + ',' + b + ',' + preset.alpha + ')';

    var opts = {
      fill: fillColor,
      fillStyle: preset.fillStyle,
      roughness: preset.roughness,
      fillWeight: preset.fillWeight,
      hachureGap: preset.hachureGap,
      hachureAngle: preset.hachureAngle,
      stroke: 'transparent',
      seed: seed
    };
    rc.draw(rg.ellipse(cx, cy, w, h, opts));
  }

  function getRC(canvasId) {
    var c = document.getElementById(canvasId);
    var ctx = c.getContext('2d');
    return { canvas: c, ctx: ctx, rc: rough.canvas(c), rg: rough.generator() };
  }

  window.redraw = function () {
    // 单个地形
    (function () {
      var r = getRC('singleCanvas');
      var cw = r.canvas.width, ch = r.canvas.height;
      r.ctx.clearRect(0, 0, cw, ch);
      r.ctx.fillStyle = '#f2e8d5'; r.ctx.fillRect(0, 0, cw, ch);

      var preset = {
        fillStyle: document.getElementById('fillStyle').value,
        color: document.getElementById('tColor').value,
        alpha: Number(document.getElementById('tAlpha').value),
        roughness: Number(document.getElementById('tRough').value),
        fillWeight: Number(document.getElementById('tWeight').value),
        hachureGap: Number(document.getElementById('tGap').value),
        hachureAngle: Number(document.getElementById('tAngle').value)
      };
      drawTerrain(r.rc, r.rg, cw / 2, ch / 2,
        Number(document.getElementById('tSizeW').value),
        Number(document.getElementById('tSizeH').value),
        preset);

      // 类型标签
      r.ctx.save();
      r.ctx.font = '12px "Noto Serif SC", "SimSun", serif';
      r.ctx.fillStyle = '#666';
      r.ctx.textAlign = 'center';
      var labels = { mountain: '山', mountain_pass: '山道', river: '河', battlefield: '战场', camp: '营地' };
      r.ctx.fillText(labels[document.getElementById('terType').value], cw / 2, ch - 10);
      r.ctx.restore();
    })();

    // 全部预设
    (function () {
      var r = getRC('allCanvas');
      var cw = r.canvas.width, ch = r.canvas.height;
      r.ctx.clearRect(0, 0, cw, ch);
      r.ctx.fillStyle = '#f2e8d5'; r.ctx.fillRect(0, 0, cw, ch);

      var types = Object.keys(PRESETS);
      var gap = cw / (types.length + 1);
      types.forEach(function (type, i) {
        var cx = gap * (i + 1);
        var cy = ch / 2;
        var preset = PRESETS[type];
        drawTerrain(r.rc, r.rg, cx, cy, 140, 100, preset);

        r.ctx.save();
        r.ctx.font = '11px "Noto Serif SC", "SimSun", serif';
        r.ctx.fillStyle = '#666';
        r.ctx.textAlign = 'center';
        r.ctx.fillText(preset.label + ' (' + preset.fillStyle + ')', cx, cy + 70);
        r.ctx.restore();
      });
    })();
  };

  window.dumpParams = function () {
    console.log('=== 地形参数 ===');
    console.log(JSON.stringify(PRESETS, null, 2));
    console.log('=== 复制上面的 JSON 发给我即可 ===');
  };

  redraw();
})();
</script>
</body>
</html>
