<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地形覆盖方案对比</title>
<script src="https://unpkg.com/roughjs@4.6.6/bundled/rough.js"></script>
<style>
  body { font-family: "Noto Serif SC", "SimSun", serif; background: #f2e8d5; padding: 20px; }
  h2 { margin: 12px 0 6px; font-size: 16px; }
  canvas { border: 1px solid #ccc; background: #f2e8d5; display: block; margin: 10px 0; }
  .controls { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
  .controls label { font-size: 12px; display: flex; flex-direction: column; gap: 2px; }
  .controls input[type=range] { width: 100px; }
  button { padding: 6px 14px; cursor: pointer; }
</style>
</head>
<body>
<h1>地形覆盖方案对比 <button onclick="dumpParams()">📋 打印参数</button> <button onclick="redraw()">🔄 重绘</button></h1>
<div class="controls">
  <label>粗糙度 <input type="range" id="roughness" min="0.5" max="3" step="0.1" value="2.2" oninput="redraw()"></label>
  <label>透明度 <input type="range" id="alpha" min="0.05" max="0.4" step="0.05" value="0.25" oninput="redraw()"></label>
  <label>线重 <input type="range" id="weight" min="0.3" max="3" step="0.1" value="1.2" oninput="redraw()"></label>
  <label>间距 <input type="range" id="gap" min="3" max="15" step="1" value="6" oninput="redraw()"></label>
  <label>色块占比 <input type="range" id="sizeRatio" min="0.1" max="1.0" step="0.05" value="0.60" oninput="redraw()"></label>
  <label>对角线(km) <input type="range" id="diagKm" min="1" max="50" step="1" value="8" oninput="redraw()"></label>
</div>

<h2>方案A: 放大地形色块</h2>
<p style="font-size:12px;color:#666;margin:0">每个地点以自身为中心向外扩散，大尺寸多边形互相交错叠加，覆盖大部分画布。</p>
<canvas id="canvasA" width="900" height="480"></canvas>

<h2>方案B: Voronoi 地形分区</h2>
<p style="font-size:12px;color:#666;margin:0">画布按最近地点分区，每个区域用对应地形纹理填充，各区域无缝邻接，整张画布被完全覆盖。</p>
<canvas id="canvasB" width="900" height="480"></canvas>

<script>
(function () {
  'use strict';

  var _hash32 = function (s) {
    var h = 0;
    for (var i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
    return h;
  };

  var PLACES = [
    { name: '东坡塬',   cx: 500, cy: 200, type: 'battlefield' },
    { name: '干涸河沟', cx: 280, cy: 330, type: 'river'       },
    { name: '塬西缓坡', cx: 140, cy: 180, type: 'mountain'    },
    { name: '塬东小路', cx: 720, cy: 290, type: 'mountain_pass' },
    { name: '塬底旧寨', cx: 440, cy: 400, type: 'camp'         },
    { name: '塬腰梯田', cx: 660, cy: 120, type: 'battlefield'  }
  ];

  var TYPE_CONFIG = {
    mountain:     { fillStyle: 'cross-hatch', color: '#8b7765', angle: -45 },
    mountain_pass:{ fillStyle: 'hachure',     color: '#9b8765', angle: -30 },
    river:        { fillStyle: 'zigzag',      color: '#6495ed', angle:  0  },
    battlefield:  { fillStyle: 'dashed',      color: '#c23b22', angle:  45 },
    camp:         { fillStyle: 'solid',       color: '#b8a080', angle:  0  }
  };

  function hexColor(cfg, alpha) {
    var col = cfg.color;
    var r = parseInt(col.slice(1,3), 16);
    var g = parseInt(col.slice(3,5), 16);
    var b = parseInt(col.slice(5,7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  function irregularVerts(cx, cy, w, h, seed, N) {
    N = N || 12;
    var verts = [];
    for (var i = 0; i < N; i++) {
      var angle = (2 * Math.PI * i) / N;
      var rnd = ((seed * (i + 1) * 31 + i * 17) % 100) / 100;
      var jitter = 0.7 + rnd * 0.6;
      var rx = (w / 2) * jitter;
      var ry = (h / 2) * jitter;
      verts.push([cx + rx * Math.cos(angle), cy + ry * Math.sin(angle)]);
    }
    return verts;
  }

  function drawTerrainBlock(rc, rg, cx, cy, w, h, cfg, seed) {
    var verts = irregularVerts(cx, cy, w, h, seed);
    var opts = {
      fill: hexColor(cfg, Number(document.getElementById('alpha').value)),
      fillStyle: cfg.fillStyle,
      roughness: Number(document.getElementById('roughness').value),
      fillWeight: Number(document.getElementById('weight').value),
      hachureGap: Number(document.getElementById('gap').value),
      hachureAngle: cfg.angle,
      stroke: 'transparent',
      seed: seed
    };
    rc.draw(rg.polygon(verts, opts));
  }

  // ── Voronoi：遍历像素网格，按最近地点分区 → 生成多边形 ──
  function voronoiRegions(cw, ch, places) {
    var grid = 8; // 8px 网格精度
    var cols = Math.ceil(cw / grid);
    var rows = Math.ceil(ch / grid);
    var regions = {};
    places.forEach(function (p) { regions[p.name] = []; });

    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        var gx = c * grid + grid / 2;
        var gy = r * grid + grid / 2;
        var best = null, bestDist = Infinity;
        places.forEach(function (p) {
          var dx = gx - p.cx, dy = gy - p.cy;
          var dist = dx * dx + dy * dy;
          if (dist < bestDist) { bestDist = dist; best = p; }
        });
        if (best) regions[best.name].push([gx, gy]);
      }
    }
    return regions;
  }

  // 把网格点集转成多边形轮廓（凸包简化）
  function gridToPolygon(cells, pad) {
    if (cells.length < 3) return cells;
    // 取边界点：四方向的极值点 + 角落点
    var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    cells.forEach(function (c) {
      minX = Math.min(minX, c[0]); maxX = Math.max(maxX, c[0]);
      minY = Math.min(minY, c[1]); maxY = Math.max(maxY, c[1]);
    });
    pad = pad || 2;
    return [
      [minX - pad, minY - pad],
      [maxX + pad, minY - pad],
      [maxX + pad, maxY + pad],
      [minX - pad, maxY + pad]
    ];
  }

  function drawVoronoi(rc, rg, cw, ch, places) {
    var regions = voronoiRegions(cw, ch, places);
    places.forEach(function (p) {
      var cells = regions[p.name];
      if (!cells || cells.length < 3) return;
      var cfg = TYPE_CONFIG[p.type];
      var seed = _hash32('voro-' + p.name);
      // 用不规则多边形包裹区域
      var verts = [];
      var bbox = gridToPolygon(cells, 2);
      var cxP = (bbox[0][0] + bbox[1][0]) / 2;
      var cyP = (bbox[0][1] + bbox[2][1]) / 2;
      var wP = bbox[1][0] - bbox[0][0];
      var hP = bbox[2][1] - bbox[0][1];
      verts = irregularVerts(cxP, cyP, wP, hP, seed, 16);
      // 确保在画布内
      verts = verts.map(function (v) {
        return [Math.max(0, Math.min(cw, v[0])), Math.max(0, Math.min(ch, v[1]))];
      });
      var opts = {
        fill: hexColor(cfg, Number(document.getElementById('alpha').value)),
        fillStyle: cfg.fillStyle,
        roughness: Number(document.getElementById('roughness').value),
        fillWeight: Number(document.getElementById('weight').value),
        hachureGap: Number(document.getElementById('gap').value),
        hachureAngle: cfg.angle,
        stroke: 'transparent',
        seed: seed
      };
      rc.draw(rg.polygon(verts, opts));
    });
  }

  function drawLabels(ctx, places) {
    places.forEach(function (place) {
      ctx.fillStyle = '#2c2c2c';
      var px = place.cx, py = place.cy, s = 9;
      ctx.beginPath();
      ctx.moveTo(px, py - s);
      ctx.lineTo(px + s - 1, py + s - 2);
      ctx.lineTo(px - s + 1, py + s - 2);
      ctx.closePath();
      ctx.fill();
      ctx.save();
      ctx.font = 'bold 13px "Noto Serif SC", "SimSun", serif';
      ctx.fillStyle = '#2c2c2c';
      ctx.textAlign = 'center';
      ctx.fillText(place.name, px, py + 16);
      ctx.restore();
    });
  }

  window.redraw = function () {
    // 方案A：底图 + 大色块叠加（模拟生产逻辑）
    (function () {
      var c = document.getElementById('canvasA');
      var ctx = c.getContext('2d');
      var rc = rough.canvas(c);
      var rg = rough.generator();
      var cw = c.width, ch = c.height;
      ctx.clearRect(0, 0, cw, ch);
      ctx.fillStyle = '#f2e8d5'; ctx.fillRect(0, 0, cw, ch);

      // 模拟生产逻辑：blockPx = diagonal * ratio * scale
      // 其中 scale = cw / (diagonal * 1000)，所以 blockPx = cw * ratio
      var ratio = Number(document.getElementById('sizeRatio').value);
      var blockPx = cw * ratio;
      console.log('[Debug] 对角线=' + document.getElementById('diagKm').value + 'km, ratio=' + ratio + ', blockPx=' + blockPx.toFixed(0) + 'px, canvas=' + cw + 'px');

      // 底图层：全画布中性土色，填补间隙
      var baseCfg = { fillStyle: 'hachure', color: '#c8b896', angle: 0 };
      drawTerrainBlock(rc, rg, cw / 2, ch / 2, cw * 0.95, ch * 0.95, baseCfg, _hash32('base-layer'));

      // 各地形色块叠加在底图上
      PLACES.forEach(function (p) {
        var cfg = TYPE_CONFIG[p.type];
        drawTerrainBlock(rc, rg, p.cx, p.cy, blockPx, blockPx * 0.7, cfg, _hash32('big-' + p.name));
      });
      drawLabels(ctx, PLACES);
    })();

    // 方案B：Voronoi 分区
    (function () {
      var c = document.getElementById('canvasB');
      var ctx = c.getContext('2d');
      var rc = rough.canvas(c);
      var rg = rough.generator();
      var cw = c.width, ch = c.height;
      ctx.clearRect(0, 0, cw, ch);
      ctx.fillStyle = '#f2e8d5'; ctx.fillRect(0, 0, cw, ch);

      drawVoronoi(rc, rg, cw, ch, PLACES);
      drawLabels(ctx, PLACES);
    })();
  };

  window.dumpParams = function () {
    console.log('=== 地形参数 ===');
    console.log(JSON.stringify({
      roughness: Number(document.getElementById('roughness').value),
      alpha: Number(document.getElementById('alpha').value),
      fillWeight: Number(document.getElementById('weight').value),
      hachureGap: Number(document.getElementById('gap').value)
    }, null, 2));
  };

  redraw();
})();
</script>
</body>
</html>
