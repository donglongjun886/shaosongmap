<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShaosongMap - 边读边看地图</title>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; height: 100vh; display: flex; }
  .panel { width: 380px; min-width: 320px; display: flex; flex-direction: column; border-right: 1px solid #ddd; background: #fafafa; }
  .panel-header { padding: 16px; background: #1a1a2e; color: #fff; font-size: 18px; font-weight: bold; display: flex; align-items: center; justify-content: space-between; }
  .panel-header small { font-size: 12px; opacity: 0.7; display: block; font-weight: normal; }
  .panel-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  textarea { flex: 1; min-height: 200px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; line-height: 1.6; resize: vertical; font-family: inherit; }
  .row { display: flex; gap: 8px; align-items: center; }
  select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; background: #fff; }
  .btn { padding: 10px 24px; background: #e63946; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; transition: background 0.2s; }
  .btn:hover { background: #d62839; }
  .btn:disabled { background: #999; cursor: not-allowed; }
  .result-section { border-top: 1px solid #eee; padding-top: 12px; }
  .result-section h3 { font-size: 14px; color: #333; margin-bottom: 8px; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin: 2px; }
  .tag-chgis { background: #d4edda; color: #155724; }
  .tag-llm { background: #fff3cd; color: #856404; }
  .tag-unknown { background: #f8d7da; color: #721c24; }
  .map-wrap { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }
  .legend { position: absolute; bottom: 20px; right: 20px; background: rgba(255,255,255,0.9); padding: 10px 14px; border-radius: 8px; font-size: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 10; }
  .legend-item { display: flex; align-items: center; gap: 6px; margin: 4px 0; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .legend-divider { height: 1px; background: #ddd; margin: 6px 0; }
  .legend-toggle { cursor: pointer; user-select: none; font-size: 11px; }
  .legend-toggle input { margin: 0; cursor: pointer; }
  .drop-zone { border: 2px dashed #ccc; border-radius: 8px; padding: 16px; text-align: center; color: #999; font-size: 13px; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
  .drop-zone:hover, .drop-zone.dragover { border-color: #e63946; background: #fff5f5; color: #e63946; }
  .drop-zone .hint { display: block; }
  .drop-wrap { position: relative; }
  .ocr-progress { display: none; align-items: center; gap: 8px; color: #666; font-size: 12px; margin-top: 8px; }
  .ocr-progress.active { display: flex; }
  .thumb-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .thumb-item { position: relative; width: 72px; height: 72px; border: 2px solid #e0e0e0; border-radius: 6px; overflow: hidden; flex-shrink: 0; }
  .thumb-item img { width: 100%; height: 100%; object-fit: cover; }
  .thumb-item .thumb-idx { position: absolute; top: 2px; left: 2px; background: rgba(0,0,0,0.6); color: #fff; font-size: 10px; padding: 1px 5px; border-radius: 3px; }
  .thumb-item .thumb-del { position: absolute; top: 2px; right: 2px; background: #d62839; color: #fff; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 12px; cursor: pointer; line-height: 1; }
  .thumb-status { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(76,175,80,0.85); color: #fff; font-size: 9px; text-align: center; padding: 1px 0; }
  .thumb-status.error { background: rgba(214,40,57,0.85); }
  .batch-controls { display: none; gap: 8px; margin-top: 8px; }
  .batch-controls.active { display: flex; }
  .batch-review { display: none; flex-direction: column; gap: 8px; margin-top: 8px; }
  .batch-review.active { display: flex; }
  .batch-review textarea { min-height: 120px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; line-height: 1.5; resize: vertical; font-family: inherit; }
  .batch-progress-bar { height: 4px; background: #e0e0e0; border-radius: 2px; margin-top: 4px; overflow: hidden; }
  .batch-progress-fill { height: 100%; background: #4caf50; transition: width 0.3s; width: 0; border-radius: 2px; }
  .small { font-size: 11px; color: #999; margin-top: 4px; display: block; }
  .maplibregl-popup { max-width: 240px !important; }
  .maplibregl-popup-content { padding: 12px; border-radius: 8px; font-size: 13px; }
  .error { color: #d62839; font-size: 13px; }
  .loading { display: none; align-items: center; gap: 8px; color: #666; font-size: 14px; }
  .loading.active { display: flex; }
  .spinner { width: 16px; height: 16px; border: 2px solid #ddd; border-top-color: #e63946; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .pipeline-progress { display: none; flex-direction: column; gap: 4px; padding: 8px 0; }
  .pipeline-progress.active { display: flex; }
  .pipeline-stage { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #999; }
  .pipeline-stage .dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #ddd; flex-shrink: 0; transition: all 0.3s; }
  .pipeline-stage.done { color: #333; }
  .pipeline-stage.done .dot { background: #4caf50; border-color: #4caf50; }
  .pipeline-stage.active { color: #e63946; font-weight: bold; }
  .pipeline-stage.active .dot { background: #fff; border-color: #e63946; animation: pulse 1s infinite; }
  .pipeline-stage.error { color: #d62839; }
  .pipeline-stage.error .dot { background: #d62839; border-color: #d62839; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
  .editable-field { border: 1px solid transparent; border-radius: 4px; padding: 2px 4px; font-size: 13px; background: transparent; font-family: inherit; transition: border 0.2s; }
  .editable-field:hover { border-color: #ccc; background: #fff; }
  .editable-field:focus { border-color: #e63946; background: #fff; outline: none; }
  .editable-field.wide { width: 100%; }
  .del-btn { background: none; border: none; color: #999; cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1; }
  .del-btn:hover { color: #d62839; }
  .add-btn { background: none; border: 1px dashed #ccc; border-radius: 4px; color: #999; cursor: pointer; font-size: 12px; padding: 2px 8px; }
  .add-btn:hover { border-color: #e63946; color: #e63946; }
  .render-btn { padding: 6px 14px; background: #e63946; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
  .render-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .render-btn.active { animation: glow 0.6s infinite alternate; }
  @keyframes glow { from { box-shadow: 0 0 4px #e63946; } to { box-shadow: 0 0 12px #e63946; } }
  /* ── 模式切换 ── */
  .input-only, .view-only { display: none; flex-direction: column; gap: 12px; }
  body:not(.mode-view) .input-only { display: flex; }
  body.mode-view .view-only { display: flex; }
  .btn-back { padding: 6px 14px; background: none; border: 1px solid #ccc; color: #333; border-radius: 6px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .btn-back:hover { background: #f0f0f0; border-color: #999; }
  .map-guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.55); color: #fff; padding: 14px 22px; border-radius: 8px; font-size: 14px; text-align: center; z-index: 5; pointer-events: none; transition: opacity 0.3s; }
  .map-guide.hidden { opacity: 0; }
  /* ── 时间轴 UI ── */
  .timeline-wrap { display: none; margin-top: 8px; }
  .timeline-wrap.active { display: block; }
  .timeline-bar { display: flex; align-items: center; gap: 0; padding: 8px 0; overflow-x: auto; }
  .timeline-node { position: relative; display: flex; flex-direction: column; align-items: center; min-width: 24px; }
  .timeline-node .dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #ccc; background: #fff; transition: all 0.3s; cursor: pointer; flex-shrink: 0; }
  .timeline-node.done .dot { background: #4caf50; border-color: #4caf50; }
  .timeline-node.current .dot { background: #e63946; border-color: #e63946; box-shadow: 0 0 6px #e63946; }
  .timeline-node.pending .dot { background: #f0f0f0; border-color: #ddd; }
  .timeline-line { flex: 1; height: 2px; background: #ddd; min-width: 16px; align-self: center; }
  .timeline-line.done { background: #4caf50; }
  .timeline-node-label { font-size: 9px; color: #999; margin-top: 2px; white-space: nowrap; }
  .step-controls { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
  .step-btn { padding: 6px 16px; background: #e63946; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; transition: background 0.2s; }
  .step-btn:hover { background: #d62839; }
  .step-btn:disabled { background: #ccc; cursor: not-allowed; }
  .step-indicator { font-size: 14px; font-weight: bold; color: #333; min-width: 60px; text-align: center; }
  .event-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px 12px; margin-top: 8px; }
  .event-card .event-type { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-right: 6px; }
  .event-type-march { background: #dbeafe; color: #1e40af; }
  .event-type-battle { background: #fee2e2; color: #991b1b; }
  .event-type-encamp { background: #fef3c7; color: #92400e; }
  .event-type-retreat { background: #f3e8ff; color: #6b21a8; }
  .event-card .event-desc { font-size: 13px; margin: 6px 0; color: #333; line-height: 1.5; }
  .event-card .event-meta { font-size: 11px; color: #666; }
  .event-card .event-meta span { margin-right: 8px; }
  .panel-header-title { flex: 1; }
  .panel-header .btn-back { color: #fff; border-color: rgba(255,255,255,0.4); display: none; }
  body.mode-view .panel-header .btn-back { display: inline-block; }
  body.mode-view .panel-header small { display: none; }
</style>
</head>
<body>

<div class="panel">
  <div class="panel-header">
    <div class="panel-header-title">
      ShaosongMap
      <small>输入战役文本，生成古代地图</small>
    </div>
    <button class="btn-back view-only" onclick="switchToInputMode()">← 返回编辑</button>
  </div>
  <div class="panel-body">

    <!-- 输入模式 -->
    <div class="input-section input-only">
      <div class="drop-wrap">
        <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
          <span class="hint">📷 拖拽截图到此处，或点击上传<br><span class="small">支持多张截图 / Ctrl+V 多次粘贴</span></span>
        </div>
        <input type="file" id="file-input" accept="image/png,image/jpeg" multiple style="display:none" onchange="handleFileSelect(event)">
        <div class="thumb-list" id="thumb-list"></div>
        <div class="batch-controls" id="batch-controls">
          <button class="btn" id="batch-ocr-btn" onclick="startBatchOCR()">🔍 开始批量识别</button>
          <button class="btn" style="background:#999" onclick="clearBatch()">清空</button>
        </div>
        <div class="ocr-progress" id="ocr-progress">
          <div class="spinner"></div>
          <div>
            <span id="ocr-progress-text">正在识别截图文字…</span>
            <div class="batch-progress-bar"><div class="batch-progress-fill" id="batch-progress-fill"></div></div>
          </div>
        </div>
        <div class="batch-review" id="batch-review">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <strong style="font-size:13px">📝 识别结果预览（可编辑校对）</strong>
            <span style="font-size:11px;color:#999" id="review-stats"></span>
          </div>
          <textarea id="review-text"></textarea>
          <div style="display:flex;gap:8px">
            <button class="btn" id="confirm-btn" onclick="confirmBatchText()">✓ 确认，填入编辑器</button>
            <button class="btn" style="background:#999" onclick="cancelReview()">取消</button>
          </div>
        </div>
      </div>
      <textarea id="text-input" placeholder='粘贴《绍宋》中的战役段落...

示例：
"岳飞率三万兵马自襄阳渡汉水，经唐州、邓州，直驱汴京。金军完颜宗弼以五万大军据守朱仙镇..."'></textarea>
      <div class="row">
        <select id="dynasty-select">
          <option value="">自动推断朝代</option>
          <option value="北宋">北宋 (960-1127)</option>
          <option value="南宋">南宋 (1127-1279)</option>
          <option value="宋">宋朝 (960-1279)</option>
          <option value="唐">唐朝 (618-907)</option>
          <option value="明">明朝 (1368-1644)</option>
        </select>
        <label style="font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer;white-space:nowrap">
          <input type="checkbox" id="mode-timeline" style="margin:0;cursor:pointer"> 时间轴模式
        </label>
        <button class="btn" id="submit-btn" onclick="analyze()">生成地图</button>
      </div>
      <div class="pipeline-progress" id="pipeline-progress">
        <div class="pipeline-stage" id="stage-extract"><span class="dot"></span> 提取结构数据</div>
        <div class="pipeline-stage" id="stage-geocode"><span class="dot"></span> 匹配古地名</div>
        <div class="pipeline-stage" id="stage-render"><span class="dot"></span> 渲染地图</div>
      </div>
      <div class="error" id="error-msg-input" style="display:none"></div>
    </div>

    <!-- 查看模式 -->
    <div class="view-section view-only">
      <div id="scale-indicator" style="font-size:12px;color:#666"></div>
      <div class="error" id="error-msg-view" style="display:none"></div>
      <div class="result-section" id="result-panel">
        <div class="timeline-wrap" id="timeline-wrap">
          <div class="timeline-bar" id="timeline-bar"></div>
          <div class="step-controls">
            <button class="step-btn" id="btn-prev" onclick="stepTo(currentStep - 1)">◀ 上一步</button>
            <span class="step-indicator" id="step-indicator">● 1/1</span>
            <button class="step-btn" id="btn-next" onclick="stepTo(currentStep + 1)">下一步 ▶</button>
          </div>
          <div class="event-card" id="event-card" style="display:none"></div>
          <div class="event-card" id="unit-card" style="display:none;border-left:3px solid #3b82f6"></div>
        </div>
        <h3>📋 提取结果 <span style="font-weight:normal;font-size:11px;color:#999">(可编辑后重新渲染)</span></h3>
        <div id="campaign-info"></div>
        <h3 style="margin-top:12px">📍 地名坐标</h3>
        <div id="places-list"></div>
        <h3 style="margin-top:12px">🛤️ 行军路线</h3>
        <div id="routes-list"></div>
        <button class="render-btn" id="render-btn" disabled onclick="reRender()">🔄 重新渲染</button>
      </div>
    </div>

  </div>
</div>

<div class="map-wrap">
  <div id="map"></div>
  <div class="map-guide" id="map-guide">输入文本或上传截图，生成战役地图</div>
  <div class="legend">
    <div class="legend-item"><span class="legend-dot" style="background:#155724"></span> CHGIS 精确匹配</div>
    <div class="legend-item"><span class="legend-dot" style="background:#856404"></span> LLM 推断坐标</div>
    <div class="legend-item"><span style="color:#e63946">━━━</span> 行军路线</div>
    <div class="legend-divider"></div>
    <label class="legend-item legend-toggle">
      <input type="checkbox" id="toggle-ancient" checked onchange="toggleLayer('place-labels-ancient', this.checked)">
      古地名
    </label>
    <label class="legend-item legend-toggle">
      <input type="checkbox" id="toggle-modern" checked onchange="toggleLayer('place-labels-modern', this.checked)">
      今地名对照
    </label>
    <div class="legend-divider"></div>
    <div class="legend-item"><span style="color:#3b82f6">◆</span> 宋军部队</div>
    <div class="legend-item"><span style="color:#ef4444">◆</span> 金军部队</div>
    <label class="legend-item legend-toggle">
      <input type="checkbox" id="toggle-units" checked onchange="toggleUnitLayers(this.checked)">
      部队箭头
    </label>
  </div>
</div>

<script>
const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
    sources: {},
    layers: []
  },
  center: [112, 33],
  zoom: 5
});

// ── 底图 Provider 架构 ──
const BASEMAP = {
  schematic: {
    id: 'schematic',
    sources: {},
    layers: [{ id: 'basemap-bg', type: 'background', paint: { 'background-color': '#f5f0e1' }, metadata: { basemap: true } }]
  },
  muted_osm: {
    id: 'muted_osm',
    sources: { 'basemap-osm': { type: 'raster', tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'], tileSize: 256, attribution: '© OSM' } },
    layers: [{ id: 'basemap-osm', type: 'raster', source: 'basemap-osm', paint: { 'raster-opacity': 0.25, 'raster-saturation': -1 }, metadata: { basemap: true } }]
  }
};
const SCALE_DEFAULT_BASEMAP = { tactical: 'schematic', battle: 'muted_osm', strategic: 'muted_osm' };
// basemapMode: 'auto' | 'schematic' | 'muted_osm' (手动切换接口预留，暂不实现UI)
let basemapMode = 'auto';

function applyBasemap(name) {
  const provider = BASEMAP[name];
  if (!provider) return;
  // 移除旧底图层
  const style = map.getStyle();
  if (style && style.layers) {
    style.layers.filter(l => l.metadata && l.metadata.basemap).forEach(l => {
      if (map.getLayer(l.id)) map.removeLayer(l.id);
    });
  }
  // 移除旧底图源
  if (style && style.sources) {
    Object.keys(style.sources).forEach(sid => {
      if (sid.startsWith('basemap-') && map.getSource(sid)) map.removeSource(sid);
    });
  }
  // 添加新底图源
  Object.entries(provider.sources).forEach(([sid, src]) => {
    if (sid) map.addSource(sid, src);
  });
  // 添加新底图层（放在最底层）
  const firstDataLayer = style && style.layers ? style.layers.find(l => !(l.metadata && l.metadata.basemap)) : null;
  provider.layers.forEach(l => {
    if (firstDataLayer && firstDataLayer.id) { map.addLayer(l, firstDataLayer.id); }
    else { map.addLayer(l); }
  });
}

map.on('load', () => {
  // 初始化默认底图
  applyBasemap('schematic');

  map.addSource('places', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
  map.addSource('routes', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });

  map.addLayer({
    id: 'places-chgis', type: 'circle', source: 'places',
    filter: ['==', ['get', 'source'], 'chgis'],
    paint: { 'circle-radius': ['step', ['zoom'], 3, 5, 6, 8, 10, 12, 14], 'circle-color': '#155724', 'circle-stroke-width': 2, 'circle-stroke-color': '#fff' }
  });
  map.addLayer({
    id: 'places-llm', type: 'circle', source: 'places',
    filter: ['==', ['get', 'source'], 'llm_infer'],
    paint: { 'circle-radius': ['step', ['zoom'], 3, 5, 6, 8, 10, 12, 14], 'circle-color': '#856404', 'circle-stroke-width': 2, 'circle-stroke-color': '#fff' }
  });
  map.addLayer({
    id: 'place-labels-ancient', type: 'symbol', source: 'places',
    layout: { 'text-field': ['get', 'name'], 'text-offset': [0, 1.5], 'text-size': ['step', ['zoom'], 9, 5, 11, 8, 13, 12, 15], 'visibility': 'visible' },
    paint: { 'text-color': '#1a1a1a', 'text-halo-color': '#fff', 'text-halo-width': 2 }
  });
  map.addLayer({
    id: 'place-labels-modern', type: 'symbol', source: 'places',
    filter: ['!=', ['get', 'modern_name'], ''],
    layout: { 'text-field': ['get', 'modern_name'], 'text-offset': [0, 2.8], 'text-size': ['step', ['zoom'], 9, 5, 11, 8, 13, 12, 15], 'visibility': 'visible' },
    paint: { 'text-color': '#888888', 'text-halo-color': '#fff', 'text-halo-width': 2 }
  });
  map.addLayer({
    id: 'route-lines', type: 'line', source: 'routes',
    paint: { 'line-color': '#e63946', 'line-width': 3, 'line-opacity': 0.8 }
  });
  map.addLayer({
    id: 'route-arrows', type: 'symbol', source: 'routes',
    layout: { 'symbol-placement': 'line', 'symbol-spacing': 120, 'text-field': '▶', 'text-size': 14 },
    paint: { 'text-color': '#e63946' }
  });
  // ── 部队块状箭头图层 ──
  map.addSource('unit-arrows', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });

  map.addLayer({
    id: 'unit-arrow-fill', type: 'fill', source: 'unit-arrows',
    paint: {
      'fill-color': ['match', ['get', 'faction'], '宋军', '#3b82f6', '金军', '#ef4444', '#888888'],
      'fill-opacity': ['match', ['get', 'status'], 'deploying', 0.5, 'marching', 0.75, 'engaging', 0.85, 'retreating', 0.3, 'routing', 0.35, 0.75],
      'fill-antialias': true

// ─── 多截图批量处理 ───

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const ocrProgress = document.getElementById('ocr-progress');
const ocrProgressText = document.getElementById('ocr-progress-text');

let _imageBatch = [];

dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length > 0) {
    for (const file of e.dataTransfer.files) addToBatch(file);
  }
});

document.addEventListener('paste', (e) => {
  if (document.activeElement?.tagName === 'TEXTAREA' || document.activeElement?.tagName === 'INPUT') return;
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      addToBatch(item.getAsFile());
    }
  }
});

function handleFileSelect(e) {
  for (const file of e.target.files) addToBatch(file);
  fileInput.value = '';
}

async function addToBatch(file) {
  if (!file.type.match(/image\/(png|jpeg)/)) { showError('仅支持 PNG 和 JPEG 格式'); return; }
  if (_imageBatch.length >= 10) { showError('每次最多添加 10 张截图'); return; }
  var errorEl = document.getElementById('error-msg-input');
  errorEl.style.display = 'none';
  const resized = await resizeImage(file, 1920);
  const dataUrl = await new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.readAsDataURL(resized);
  });
  _imageBatch.push({ blob: resized, dataUrl });
  renderThumbnails();
}

function removeFromBatch(index) { _imageBatch.splice(index, 1); renderThumbnails(); }

function renderThumbnails() {
  const list = document.getElementById('thumb-list');
  const controls = document.getElementById('batch-controls');
  if (_imageBatch.length === 0) { list.innerHTML = ''; controls.classList.remove('active'); return; }
  list.innerHTML = _imageBatch.map((item, i) =>
    `<div class="thumb-item">
      <img src="${item.dataUrl}" alt="截图${i + 1}">
      <span class="thumb-idx">${i + 1}</span>
      <button class="thumb-del" onclick="event.stopPropagation();removeFromBatch(${i})" title="删除">×</button>
    </div>`
  ).join('');
  controls.classList.add('active');
}

function clearBatch() {
  _imageBatch = [];
  renderThumbnails();
  document.getElementById('batch-review').classList.remove('active');
  document.getElementById('error-msg-input').style.display = 'none';
  ocrProgress.classList.remove('active');
}

async function resizeImage(file, maxDim) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      if (width <= maxDim && height <= maxDim) { resolve(file); return; }
      const ratio = Math.min(maxDim / width, maxDim / height);
      width = Math.round(width * ratio);
      height = Math.round(height * ratio);
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      canvas.toBlob((blob) => resolve(blob), file.type, 0.85);
    };
    img.src = URL.createObjectURL(file);
  });
}

async function startBatchOCR() {
  if (_imageBatch.length === 0) return;
  var errorEl = document.getElementById('error-msg-input');
  errorEl.style.display = 'none';
  ocrProgress.classList.add('active');
  ocrProgressText.textContent = `正在识别第 1/${_imageBatch.length} 张截图…`;
  document.getElementById('batch-progress-fill').style.width = '0%';
  document.getElementById('batch-controls').classList.remove('active');
  document.querySelectorAll('.thumb-status').forEach(el => el.remove());
  try {
    const formData = new FormData();
    _imageBatch.forEach((item, i) => formData.append('files', item.blob, `screenshot_${i + 1}.png`));
    const resp = await fetch('/api/ocr/batch', { method: 'POST', body: formData });
    if (!resp.ok) { const err = await resp.json(); throw new Error(err.detail || '批量识别失败'); }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      let eventType = '', eventData = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) { eventType = line.slice(7); }
        else if (line.startsWith('data: ')) {
          eventData = line.slice(6);
          if (eventType && eventData) { try { handleBatchSSE(eventType, JSON.parse(eventData)); } catch (_) {} }
          eventType = ''; eventData = '';
        }
      }
    }
  } catch (e) {
    showError(e.message || '批量识别失败，请重试');
    ocrProgress.classList.remove('active');
    document.getElementById('batch-controls').classList.add('active');
  }
}

function handleBatchSSE(type, data) {
  if (type === 'progress') {
    const pct = Math.round((data.current / data.total) * 100);
    ocrProgressText.textContent = `正在识别第 ${data.current}/${data.total} 张截图（${data.char_count} 字）…`;
    document.getElementById('batch-progress-fill').style.width = pct + '%';
    const items = document.querySelectorAll('.thumb-item');
    if (items[data.current - 1]) {
      const status = document.createElement('div');
      status.className = 'thumb-status';
      status.textContent = '✓ ' + data.char_count + '字';
      items[data.current - 1].appendChild(status);
    }
  } else if (type === 'merge') {
    ocrProgressText.textContent = `去重拼接完成：${data.original_chars} → ${data.merged_chars} 字（去除 ${data.removed_dup} 字重复）`;
  } else if (type === 'complete') {
    ocrProgress.classList.remove('active');
    document.getElementById('review-text').value = data.text;
    document.getElementById('review-stats').textContent = `共 ${data.text.length} 字`;
    document.getElementById('batch-review').classList.add('active');
  } else if (type === 'error') {
    showError(data.message || '批量识别失败');
    ocrProgress.classList.remove('active');
    document.getElementById('batch-controls').classList.add('active');
  }
}

function confirmBatchText() {
  const text = document.getElementById('review-text').value.trim();
  if (!text) { showError('识别结果为空白，请重新截图'); return; }
  document.getElementById('text-input').value = text;
  document.getElementById('batch-review').classList.remove('active');
  clearBatch();
}

function cancelReview() {
  document.getElementById('batch-review').classList.remove('active');
  document.getElementById('batch-controls').classList.add('active');
}

// ─── SSE 提取 ───

async function analyze() {
  const text = document.getElementById('text-input').value.trim();
  if (!text) { showError('请输入战役文本或上传截图'); return; }
  const submitBtn = document.getElementById('submit-btn');
  submitBtn.disabled = true;
  document.getElementById('error-msg-input').style.display = 'none';
  document.getElementById('result-panel').style.display = 'block';
  resetProgress();

  const dynasty = document.getElementById('dynasty-select').value;
  const mode = document.getElementById('mode-timeline').checked ? 'timeline' : 'static';

  try {
    const resp = await fetch('/api/extract', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, dynasty: dynasty || null, mode: mode })
    });
    if (!resp.ok) { const err = await resp.json(); throw new Error(err.detail || `请求失败 (${resp.status})`); }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      let eventType = '', eventData = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) { eventType = line.slice(7); }
        else if (line.startsWith('data: ')) {
          eventData = line.slice(6);
          if (eventType === 'progress' || eventType === 'result' || eventType === 'error') {
            try { const data = JSON.parse(eventData); handleSSEEvent(eventType, data); } catch (_) {}
          }
          eventType = ''; eventData = '';
        }
      }
    }
  } catch (e) {
    showError(e.message || '服务暂不可用，请稍后重试');
    STAGES.forEach(s => {
      const el = document.getElementById('stage-' + s);
      if (el.classList.contains('active')) setStageState(s, 'error');
    });
  } finally {
    submitBtn.disabled = false;
  }
}

function handleSSEEvent(type, data) {
  if (type === 'progress') {
    setStageState(data.stage, 'ok' in data && !data.ok ? 'error' : 'done');
    const stageOrder = {'extract_done': 'extract', 'geocode_done': 'geocode', 'render_done': 'render'};
    const idx = STAGES.indexOf(stageOrder[data.stage]);
    if (idx >= 0 && idx + 1 < STAGES.length) { setStageState(STAGES[idx + 1], 'active'); }
  } else if (type === 'error') {
    const stageMap = {extract: 'extract', geocode: 'geocode', render: 'render'};
    const stage = stageMap[data.stage] || 'extract';
    setStageState(stage, 'error');
    showError(data.message || '处理失败');
  } else if (type === 'result') {
    setStageState('render', 'done');
    _lastExtractData = data;
    _dataModified = false;
    const scaleLabels = { tactical: '⚔️ 战术级 (1-10km)', battle: '🏴 战役级 (20-200km)', strategic: '🗺️ 战略级 (200-1000km)' };
    document.getElementById('scale-indicator').textContent = scaleLabels[data.scale] || '';
    if (data.events && data.events.length > 0) {
      _events = data.events;
      totalSteps = data.total_steps || data.events.length;
      currentStep = totalSteps;
      _units = data.units || [];
      _unitStates = data.unit_states || [];
      renderTimeline();
      renderUnitStateCard(currentStep);
      document.getElementById('timeline-wrap').classList.add('active');
    } else {
      _events = [];
      totalSteps = 0;
      _units = [];
      _unitStates = [];
      document.getElementById('timeline-wrap').classList.remove('active');
      document.getElementById('unit-card').style.display = 'none';
    }
    renderEditableResult(data);
    updateMap(data);
    // 自动切换到查看模式
    switchToViewMode();
  }
}

// ─── 可编辑结果面板 ───

function renderEditableResult(data) {
  const renderBtn = document.getElementById('render-btn');
  renderBtn.disabled = true;
  renderBtn.classList.remove('active');

  const nameHtml = data.campaign_name
    ? `<strong>战役名:</strong> <input class="editable-field" id="edit-name" value="${escHtml(data.campaign_name)}" oninput="markModified()">`
    : `<strong>战役名:</strong> <input class="editable-field" id="edit-name" placeholder="未命名" oninput="markModified()">`;

  let factionsHtml = '';
  data.factions.forEach((f, fi) => {
    const commanders = f.commanders.map((c, ci) =>
      `<input class="editable-field" id="edit-cmd-${fi}-${ci}" value="${escHtml(c)}" oninput="markModified()"><button class="del-btn" onclick="delCommander(${fi},${ci})" title="删除将领">×</button>`
    ).join('');
    factionsHtml += `<div style="margin:4px 0"><strong>${escHtml(f.name)}:</strong> 将领: ${commanders}<button class="add-btn" onclick="addCommander(${fi})">+将领</button> 兵力: <input class="editable-field" id="edit-troops-${fi}" value="${escHtml(f.troops || '')}" placeholder="未知" oninput="markModified()"></div>`;
  });

  let placesHtml = data.features.map((f, i) => {
    const tagClass = f.source === 'chgis' ? 'tag-chgis' : f.source === 'llm_infer' ? 'tag-llm' : 'tag-unknown';
    const coords = f.lng ? ` (${f.lng.toFixed(2)}, ${f.lat.toFixed(2)})` : '';
    return `<span class="tag ${tagClass}"><input class="editable-field" id="edit-place-${i}" value="${escHtml(f.name)}" style="width:60px" oninput="markModified()">${coords}<button class="del-btn" onclick="delPlace(${i})" title="删除地名">×</button></span>`;
  }).join(' ');
  placesHtml += ` <button class="add-btn" onclick="addPlace()">+地名</button>`;

  let routesHtml = '';
  data.routes.forEach((r, i) => {
    routesHtml += `<div style="margin:2px 0">📌 <input class="editable-field" id="edit-route-from-${i}" value="${escHtml(r.from_place)}" style="width:60px" oninput="markModified()"> → <input class="editable-field" id="edit-route-to-${i}" value="${escHtml(r.to_place)}" style="width:60px" oninput="markModified()"><button class="del-btn" onclick="delRoute(${i})" title="删除路线">×</button></div>`;
  });
  if (!routesHtml) routesHtml = '未检测到行军路线';
  routesHtml += ` <button class="add-btn" onclick="addRoute()">+路线</button>`;

  document.getElementById('campaign-info').innerHTML = `<div>${nameHtml}${factionsHtml}</div>`;
  document.getElementById('places-list').innerHTML = placesHtml;
  document.getElementById('routes-list').innerHTML = routesHtml;
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function markModified() {
  _dataModified = true;
  const btn = document.getElementById('render-btn');
  btn.disabled = false;
  btn.classList.add('active');
}

function collectModifiedData() {
  const name = document.getElementById('edit-name')?.value || '';
  const data = { campaign_name: name || null, factions: [], places: [], routes: [], dynasty: document.getElementById('dynasty-select').value || null, scale: _lastExtractData?.scale || null };
  if (_lastExtractData) {
    _lastExtractData.factions.forEach((f, fi) => {
      const commanders = [];
      let ci = 0;
      while (true) { const el = document.getElementById(`edit-cmd-${fi}-${ci}`); if (!el) break; const v = el.value.trim(); if (v) commanders.push(v); ci++; }
      const troopsEl = document.getElementById(`edit-troops-${fi}`);
      data.factions.push({ name: f.name, commanders, troops: troopsEl?.value.trim() || null });
    });
  }
  let pi = 0;
  while (true) { const el = document.getElementById(`edit-place-${pi}`); if (!el) break; const v = el.value.trim(); if (v) data.places.push({ name: v, context: '' }); pi++; }
  let ri = 0;
  while (true) {
    const fromEl = document.getElementById(`edit-route-from-${ri}`);
    const toEl = document.getElementById(`edit-route-to-${ri}`);
    if (!fromEl || !toEl) break;
    const from = fromEl.value.trim(); const to = toEl.value.trim();
    if (from && to) data.routes.push({ from, to, via: [] });
    ri++;
  }
  return data;
}

function delPlace(i) { const el = document.getElementById(`edit-place-${i}`); if (el) { el.closest('.tag')?.remove(); markModified(); } }
function addPlace() {
  const container = document.getElementById('places-list');

  btn.before(span);

}
function delCommander(fi, ci) { const el = document.getElementById(`edit-cmd-${fi}-${ci}`); if (el) { el.previousElementSibling?.remove(); el.nextElementSibling?.remove(); el.remove(); markModified(); } }
function addCommander(fi) {
  let ci = 0;
  while (document.getElementById(`edit-cmd-${fi}-${ci}`)) ci++;
  const parent = document.querySelector(`[onclick="addCommander(${fi})"]`).parentNode;

  parent.querySelector('.add-btn').before(span);

}
function delRoute(i) { const fromEl = document.getElementById(`edit-route-from-${i}`); if (fromEl) fromEl.closest('div').remove(); markModified(); }
function addRoute() {
  const container = document.getElementById('routes-list');

  const btn = container.querySelector('.add-btn');

}

// ─── 重新渲染 ───

async function reRender() {
  const data = collectModifiedData();
  const btn = document.getElementById('render-btn');
  btn.disabled = true;
  btn.classList.remove('active');
  btn.textContent = '⏳ 重新渲染中...';
  try {
    const resp = await fetch('/api/render', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
    if (!resp.ok) { const err = await resp.json(); throw new Error(err.detail || '渲染失败'); }
    const result = await resp.json();
    _lastExtractData = result;
    _dataModified = false;
    _events = [];
    totalSteps = 0;
    document.getElementById('timeline-wrap').classList.remove('active');
    updateMap(result);
    btn.textContent = '✓ 已更新';
    setTimeout(() => { btn.textContent = '🔄 重新渲染'; }, 1500);
  } catch (e) {
    showError(e.message);
    btn.textContent = '🔄 重试';
    btn.disabled = false;
  }
}

// ─── 地图更新 ───

function updateMap(data) {
  const geojsonFeatures = data.geojson.features || [];
  const placeFeatures = geojsonFeatures.filter(f => f.geometry.type === 'Point');
  const routeFeatures = geojsonFeatures.filter(f => f.geometry.type === 'LineString');
  const unitFeatures = geojsonFeatures.filter(f => f.geometry.type === 'Polygon');
  map.getSource('places').setData({ type: 'FeatureCollection', features: placeFeatures });
  map.getSource('routes').setData({ type: 'FeatureCollection', features: routeFeatures });
  map.getSource('unit-arrows').setData({ type: 'FeatureCollection', features: unitFeatures });
  // 底图根据 scale 自动切换
  if (basemapMode === 'auto' && data.scale) {
    applyBasemap(SCALE_DEFAULT_BASEMAP[data.scale] || 'schematic');
  }

  if (placeFeatures.length > 0) {
    const bounds = new maplibregl.LngLatBounds();
    placeFeatures.forEach(f => { if (f.geometry?.coordinates) bounds.extend(f.geometry.coordinates); });
    routeFeatures.forEach(f => { if (f.geometry?.coordinates) f.geometry.coordinates.forEach(c => bounds.extend(c)); });
    const zoomMap = { tactical: 14, battle: 10, strategic: 6 };
    const maxZoom = zoomMap[data.scale] || 10;
    map.fitBounds(bounds, { padding: 60, maxZoom: maxZoom });
  }
  applyTimelineFilters();
}

function _safeFilter(layerId, filter) {
  if (map.getLayer(layerId)) { map.setFilter(layerId, filter); }
}
function _safeLayout(layerId, prop, val) {
  if (map.getLayer(layerId)) { map.setLayoutProperty(layerId, prop, val); }
}

function applyTimelineFilters() {
  if (totalSteps === 0) {
    map.setFilter('places-chgis', null);
    map.setFilter('places-llm', null);
    map.setFilter('places-chgis-dim', ['==', ['get', 'step'], -1]);
    map.setFilter('places-llm-dim', ['==', ['get', 'step'], -1]);
    map.setFilter('route-lines', null);
    map.setFilter('route-arrows', null);
    _safeFilter('unit-arrow-fill', null);
    _safeFilter('unit-arrow-outline', null);
    _safeFilter('unit-arrow-labels', null);
    return;
  }
  var activeFilter = ['any', ['<=', ['get', 'step'], currentStep], ['!', ['has', 'step']]];
  map.setFilter('places-chgis', activeFilter);
  map.setFilter('places-llm', activeFilter);
  var dimFilter = ['>', ['get', 'step'], currentStep];
  map.setFilter('places-chgis-dim', dimFilter);
  map.setFilter('places-llm-dim', dimFilter);
  map.setFilter('route-lines', activeFilter);
  map.setFilter('route-arrows', activeFilter);
  _safeFilter('unit-arrow-fill', ['all', ['<=', ['get', 'step'], currentStep], ['!=', ['get', 'status'], 'routing']]);
  _safeFilter('unit-arrow-outline', ['<=', ['get', 'step'], currentStep]);
  _safeFilter('unit-arrow-labels', ['all', ['<=', ['get', 'step'], currentStep], ['!=', ['get', 'status'], 'routing']]);
}

// ─── 键盘快捷键 ───

document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); analyze(); }
  if (e.key === 'Escape') {
    document.querySelectorAll('.maplibregl-popup').forEach(p => p.remove());
    document.getElementById('error-msg-input').style.display = 'none';
    document.getElementById('error-msg-view').style.display = 'none';
  }
});

// ─── 图层切换 ───

function toggleLayer(layerId, visible) { map.setLayoutProperty(layerId, 'visibility', visible ? 'visible' : 'none'); }

function toggleUnitLayers(visible) {
  var v = visible ? 'visible' : 'none';
  _safeLayout('unit-arrow-fill', 'visibility', v);
  _safeLayout('unit-arrow-outline', 'visibility', v);
  _safeLayout('unit-arrow-labels', 'visibility', v);
}

function showUnitPopup(e) {
  var props = e.features[0].properties;
  var coords = e.lngLat;
  var statusLabels = { deploying: '待命中', marching: '进军中', engaging: '交战中', retreating: '撤退中', routing: '已溃散' };
  var statusLabel = statusLabels[props.status] || props.status;
  new maplibregl.Popup()
    .setLngLat(coords)
    .setHTML('<strong>' + escHtml(props.unit_name) + '</strong><br>' +
      '阵营: ' + escHtml(props.faction) + '<br>' +
      '状态: ' + statusLabel + '<br>' +
      '方向: ' + (props.direction || '未明确') + '<br>' +
      (props.description ? '<small>' + escHtml(props.description) + '</small>' : ''))
    .addTo(map);
}

// ─── 时间轴交互 ───

function stepTo(step) {
  if (step < 1 || step > totalSteps) return;
  currentStep = step;
  applyTimelineFilters();
  renderEventCard(currentStep);
  renderUnitStateCard(currentStep);
  updateTimelineBar();
  updateStepButtons();
}

function renderTimeline() {
  var bar = document.getElementById('timeline-bar');
  var html = '';
  for (var i = 1; i <= totalSteps; i++) {
    if (i > 1) { var lineClass = (i <= currentStep) ? 'timeline-line done' : 'timeline-line'; html += '<div class="' + lineClass + '"></div>'; }
    var nodeClass = 'timeline-node';
    if (i < currentStep) nodeClass += ' done';
    else if (i === currentStep) nodeClass += ' current';
    else nodeClass += ' pending';
    var ev = _events[i - 1] || {};
    var typeLabel = {march: '行军', battle: '战斗', encamp: '扎营', retreat: '撤退'}[ev.event_type] || '';
    html += '<div class="' + nodeClass + '" onclick="stepTo(' + i + ')" title="' + typeLabel + ': ' + (ev.description || '') + '"><span class="dot"></span><span class="timeline-node-label">T' + i + '</span></div>';
  }
  bar.innerHTML = html;
  updateStepButtons();
  renderEventCard(currentStep);
}

function updateTimelineBar() {
  var nodes = document.querySelectorAll('.timeline-node');
  var lines = document.querySelectorAll('.timeline-line');
  nodes.forEach(function(node, i) {
    var step = i + 1;
    node.classList.remove('done', 'current', 'pending');
    if (step < currentStep) node.classList.add('done');
    else if (step === currentStep) node.classList.add('current');
    else node.classList.add('pending');
  });
  lines.forEach(function(line, i) { line.classList.toggle('done', (i + 1) < currentStep); });
}

function updateStepButtons() {
  document.getElementById('btn-prev').disabled = (currentStep <= 1);
  document.getElementById('btn-next').disabled = (currentStep >= totalSteps);
  document.getElementById('step-indicator').textContent = '● ' + currentStep + '/' + totalSteps;
}

function renderEventCard(step) {
  var card = document.getElementById('event-card');
  if (!_events || step < 1 || step > _events.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  var ev = _events[step - 1];
  var typeLabels = {march: '行军', battle: '战斗', encamp: '扎营', retreat: '撤退'};
  var typeLabel = typeLabels[ev.event_type] || ev.event_type;
  var typeClass = 'event-type-' + ev.event_type;
  var actorsHtml = (ev.actors || []).length > 0 ? '<span>🎯 ' + ev.actors.join('、') + '</span>' : '';
  var placesHtml = (ev.places_involved || []).length > 0 ? '<span>📍 ' + ev.places_involved.join('、') + '</span>' : '';
  card.innerHTML = '<span class="event-type ' + typeClass + '">' + typeLabel + '</span><strong>T' + ev.seq + '</strong>' +
    '<div class="event-desc">' + escHtml(ev.description || '') + '</div>' +
    '<div class="event-meta">' + actorsHtml + placesHtml + '</div>';
}

function renderUnitStateCard(step) {
  var card = document.getElementById('unit-card');
  if (!_unitStates || _unitStates.length === 0) { card.style.display = 'none'; return; }
  var stepStates = _unitStates.filter(function(us) { return us.seq === step; });
  if (stepStates.length === 0) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  var statusLabels = { deploying: '待命', marching: '进军', engaging: '交战', retreating: '撤退', routing: '溃散' };
  var statusColors = { deploying: '#f0ad4e', marching: '#3b82f6', engaging: '#ef4444', retreating: '#a855f7', routing: '#999' };
  var rows = stepStates.map(function(us) {
    var color = statusColors[us.status] || '#999';
    var label = statusLabels[us.status] || us.status;
    return '<div style="margin:6px 0;display:flex;align-items:flex-start;gap:8px">' +
      '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + color + ';flex-shrink:0;margin-top:3px"></span>' +
      '<div><strong>' + escHtml(us.unit_name) + '</strong> ' +
      '<span style="display:inline-block;padding:1px 6px;border-radius:3px;font-size:11px;background:' + color + ';color:#fff">' + label + '</span>' +
      '<div style="font-size:12px;color:#555;margin-top:2px">' + (us.description || '') + '</div>' +
      (us.location ? '<span style="font-size:11px;color:#888">📍 ' + escHtml(us.location) + '</span>' : '') +
      '</div></div>';
  });
  card.innerHTML = '<div style="font-size:13px;font-weight:bold;margin-bottom:6px">⚔️ 部队动态 (T' + step + ')</div>' + rows.join('');
}

document.addEventListener('keydown', function(e) {
  if (totalSteps === 0) return;
  if (e.key === 'ArrowLeft') { e.preventDefault(); stepTo(currentStep - 1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); stepTo(currentStep + 1); }
});
</script>
